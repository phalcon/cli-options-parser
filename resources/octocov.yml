# octocov configuration - https://github.com/k1LoW/octocov
#
# Default config: used on pushes (including the default branch). The gate is a
# stable FLOOR only, so a coverage blip on the default branch never red-Xs the
# build. Pull requests use octocov.pr.yml, which adds the no-regression
# (diff >= 0) ratchet on top of this floor.
#
# Paths below are relative to THIS file's directory (resources/), so `../`.
coverage:
  paths:
    - ../tests/_output/coverage.xml
  acceptable: "current >= 100%"
  badge:
    path: ../tests/_output/coverage.svg
codeToTestRatio:
  code:
    - ../src/**/*.php
  test:
    - ../tests/**/*.php
testExecutionTime:
  steps:
    - Tests with coverage
comment:
  if: is_pull_request
summary:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
