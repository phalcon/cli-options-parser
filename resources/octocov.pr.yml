# octocov configuration - https://github.com/k1LoW/octocov
#
# Pull-request config: identical to octocov.yml except the gate adds the
# no-regression check (diff >= 0), so a PR cannot lower coverage versus the
# base branch. Keep the rest of this file in sync with octocov.yml.
#
# Paths below are relative to THIS file's directory (resources/), so `../`.
coverage:
  paths:
    - ../tests/_output/coverage.xml
  acceptable: "current >= 100% && diff >= 0"
  badge:
    path: ../tests/_output/coverage.svg
codeToTestRatio:
  code:
    - ../src/**/*.php
  test:
    - ../tests/**/*.php
testExecutionTime:
  steps:
    - Tests with coverage
comment:
  if: is_pull_request
summary:
  if: true
diff:
  datastores:
    - artifact://${GITHUB_REPOSITORY}
report:
  if: is_default_branch
  datastores:
    - artifact://${GITHUB_REPOSITORY}
